name: validate-refactor

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "v*-dev"

jobs:
  build-host:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build central server
        shell: pwsh
        run: dotnet build .\central_server\CentralServer.csproj -c Release

      - name: Build host shared library
        shell: pwsh
        run: dotnet build .\host_shared\HostShared.csproj -c Release

      - name: Run host contract tests
        shell: pwsh
        run: dotnet run --project .\tests\host_contracts\HostContracts.csproj -c Release

      - name: Run plugin headless harness
        shell: pwsh
        run: dotnet run --project .\tests\godot_plugin_harness\GodotPluginHarness.csproj -c Release -- --allow-skip-missing-godot

      - name: Run reuse session smoke
        shell: pwsh
        run: .\scripts\smoke_central_server_system_session.ps1 -SkipBuild

      - name: Validate refactor guardrails
        shell: pwsh
        run: .\scripts\validate_refactor_guardrails.ps1
