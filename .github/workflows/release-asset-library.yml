name: Sync asset-library branch

on:
  push:
    tags: ['v*']

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restructure and push to asset-library
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${GITHUB_REF_NAME}"
          echo "Building asset-library structure for tag: $TAG"

          # 创建临时孤立分支
          git checkout --orphan asset-library-tmp

          # 创建目标目录
          mkdir -p addons/godot_dotnet_mcp

          # 移动插件文件
          for item in plugin.cfg plugin.gd plugin.gd.uid tools ui plugin; do
            if [ -e "$item" ]; then
              git mv "$item" "addons/godot_dotnet_mcp/"
            fi
          done

          # 提交
          git commit -m "release: $TAG - Asset Library structure (addons/godot_dotnet_mcp/)"

          # 强制更新 asset-library 分支
          git push origin HEAD:asset-library --force

          echo "asset-library branch updated to: $(git rev-parse HEAD)"
